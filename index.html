<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local HLS Stream Tester</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; text-align: center; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎥 Local HLS Multi-Bitrate Player</h2>
        <video id="video" controls></video>
    </div>

    <script>
        const video = document.getElementById('video');
        const videoSrc = './output/master.m3u8';

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                console.log("Master playlist loaded! Video resolutions available.");
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = videoSrc;
        }
    </script>
</body>
</html>
